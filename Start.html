<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Know Your JJK Character</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        padding: 2rem;
        background: #f8fafc;
        color: #111827;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #111827;
      }

      .gif-container {
        max-width: 360px;
        width: 100%;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 24px 60px rgba(17, 24, 39, 0.12);
        background: #ffffff;
        border: 1px solid rgba(17, 24, 39, 0.08);
      }

      .gif-container img {
        display: block;
        width: 100%;
        height: auto;
      }

      .start-button {
        border: none;
        padding: 0.95rem 1.5rem;
        border-radius: 999px;
        background: #111827;
        color: #ffffff;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 700;
        transition:
          transform 0.2s ease,
          background 0.2s ease;
      }

      .start-button:hover {
        transform: translateY(-1px);
        background: #0f172a;
      }
    </style>
  </head>
  <body>
    <h1>Know Your JJK Character</h1>
    <div class="gif-container">
      <img
        src="Jujutsu Kaisen Jjk GIF by Lofi Girl.gif"
        alt="JJK character gif"
      />
    </div>
    <a class="start-button" href="Card.html">Start</a>
  </body>
</html>
